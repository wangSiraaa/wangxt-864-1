version: '3.8'

services:
  campus-runner-ticket:
    build: .
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"\]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - ./public:/app/public:ro
